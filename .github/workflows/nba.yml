name: NBA Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0,6,12,18 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"
      - name: Cache Key (requirements)
        id: req
        run: echo "hash=$(sha256sum requirements.txt | cut -d ' ' -f1)" >> $GITHUB_OUTPUT
      - name: Cache HuggingFace Models
        uses: actions/cache@v4
        with:
          path: .hf_cache
          key: hf-${{ runner.os }}-${{ steps.req.outputs.hash }}
          restore-keys: |
            hf-${{ runner.os }}-
      - name: Cache Key (WAT day)
        id: day
        run: echo "day=$(TZ=Africa/Lagos date +%Y-%m-%d)" >> $GITHUB_OUTPUT
      - name: Cache Sent State
        uses: actions/cache@v4
        with:
          path: .state
          # Cache is immutable per key; use a unique key per run so we can "update" state each run.
          # Restore by WAT-day prefix so subsequent runs pick up the latest saved state for the day.
          key: state-${{ github.workflow }}-${{ steps.day.outputs.day }}-${{ github.run_id }}
          restore-keys: |
            state-${{ github.workflow }}-${{ steps.day.outputs.day }}-
      - name: Debug (commit + bot version)
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          python -c "from pathlib import Path; print('multi_sport_bot.py#L80:', Path('multi_sport_bot.py').read_text(encoding='utf-8', errors='replace').splitlines()[79])"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run NBA now
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BALLDONTLIE_KEYS: ${{ secrets.BALLDONTLIE_KEYS }}
          REQUESTS_TRUST_ENV: "0"
          HF_HOME: ${{ github.workspace }}/.hf_cache
          TRANSFORMERS_CACHE: ${{ github.workspace }}/.hf_cache
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "[INFO] Manual run: resend enabled (no dedupe)."
            python scheduler.py --sport nba --now --resend
          else
            python scheduler.py --sport nba --now
          fi
