name: Tennis Predictions

on:
  workflow_dispatch:
  schedule:
    # Cron is UTC. Every 2 hours keeps it frequent without being too spammy.
    - cron: "0 */2 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache Key (UTC day)
        id: day
        run: echo "day=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
      - name: Cache Sent State
        uses: actions/cache@v4
        with:
          path: .state
          key: state-${{ github.workflow }}-${{ steps.day.outputs.day }}
          restore-keys: |
            state-${{ github.workflow }}-
      - name: Debug (commit + bot version)
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          python -c "from pathlib import Path; print('multi_sport_bot.py#L80:', Path('multi_sport_bot.py').read_text(encoding='utf-8', errors='replace').splitlines()[79])"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tennis now
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TENNIS_API_KEYS: ${{ secrets.TENNIS_API_KEYS }}
          REQUESTS_TRUST_ENV: "0"
        run: python scheduler.py --sport tennis --now
