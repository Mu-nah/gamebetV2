name: WTA Prediction Bot

on:
  schedule:
    # WAT = UTC+1. All times below are UTC (subtract 1hr for WAT)
    # 1:00 WAT  = 00:00 UTC
    # 3:00 WAT  = 02:00 UTC
    # 5:00 WAT  = 04:00 UTC
    # 7:00 WAT  = 06:00 UTC
    # 9:00 WAT  = 08:00 UTC
    # 11:00 WAT = 10:00 UTC
    # 13:00 WAT = 12:00 UTC
    # 15:00 WAT = 14:00 UTC
    # 17:00 WAT = 16:00 UTC
    # 19:00 WAT = 18:00 UTC
    # 21:00 WAT = 20:00 UTC
    # 23:00 WAT = 22:00 UTC
    - cron: '0 0 * * *'
    - cron: '0 2 * * *'
    - cron: '0 4 * * *'
    - cron: '0 6 * * *'
    - cron: '0 8 * * *'
    - cron: '0 10 * * *'
    - cron: '0 12 * * *'
    - cron: '0 14 * * *'
    - cron: '0 16 * * *'
    - cron: '0 18 * * *'
    - cron: '0 20 * * *'
    - cron: '0 22 * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20       # kill if it hangs (e.g. playwright blocked)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Restore sent_matches cache
        uses: actions/cache@v4
        with:
          path: sent_matches.json
          # Key includes date so cache is fresh each day
          key: sent-matches-${{ env.TODAY }}
          restore-keys: |
            sent-matches-
        env:
          TODAY: ${{ env.TODAY }}

      - name: Set today date env var
        run: echo "TODAY=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Run WTA bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python predictor.py

      - name: Save sent_matches cache
        uses: actions/cache@v4
        if: always()     # save even if bot found no picks
        with:
          path: sent_matches.json
          key: sent-matches-${{ env.TODAY }}
