name: WTA Prediction Bot

on:
  schedule:
    - cron: '0 0 * * *'    # 01:00 WAT — daily reset
    - cron: '0 3 * * *'    # 04:00 WAT
    - cron: '0 6 * * *'    # 07:00 WAT
    - cron: '0 9 * * *'    # 10:00 WAT
    - cron: '0 12 * * *'   # 13:00 WAT
    - cron: '0 15 * * *'   # 16:00 WAT
    - cron: '0 18 * * *'   # 19:00 WAT
    - cron: '0 21 * * *'   # 22:00 WAT
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Give the job write permission so it can push state files back to repo
    permissions:
      contents: write

    steps:
      - name: Set TODAY and RUN_MODE
        run: |
          echo "TODAY=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          HOUR=$(date -u +%H)
          EVENT="${{ github.event_name }}"
          if   [ "$EVENT" = "workflow_dispatch" ]; then
            echo "RUN_MODE=force"       >> $GITHUB_ENV && echo "▶ force"
          elif [ "$HOUR"  = "00" ]; then
            echo "RUN_MODE=daily_reset" >> $GITHUB_ENV && echo "▶ daily_reset"
          else
            echo "RUN_MODE=normal"      >> $GITHUB_ENV && echo "▶ normal (UTC hour=$HOUR)"
          fi

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use a PAT so the push step later can trigger other workflows if needed.
          # Falls back to GITHUB_TOKEN (which is fine for just committing state files).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          RUN_MODE:  ${{ env.RUN_MODE }}
        run: python predictor.py

      # ── Commit state files back to repo ──────────────────────────────────
      # This is the ONLY reliable way to persist state between Actions runs.
      # sent_matches.json  — dedup (prevents same pick being sent twice today)
      # elo_db.json        — surface ELO (grows over the season)
      # outcomes.json      — calibration log
      # h2h_cache.json     — H2H pairs (avoid re-scraping)
      - name: Commit state files
        if: always()
        run: |
          git config user.name  "wta-bot"
          git config user.email "wta-bot@users.noreply.github.com"

          # Stage only the state files — ignore everything else
          git add -f sent_matches.json elo_db.json outcomes.json h2h_cache.json 2>/dev/null || true

          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "bot: update state files [skip ci]"
            git push
          fi
