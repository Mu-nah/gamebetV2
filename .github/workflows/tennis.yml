name: WTA Prediction Bot

# ─────────────────────────────────────────────────────────────
# SCHEDULE  (UTC — WAT is UTC+1)
#
#  00:00 UTC = 01:00 WAT  ← DAILY RESET (dedup ignored, all HIGH picks sent)
#  03:00 UTC = 04:00 WAT
#  06:00 UTC = 07:00 WAT
#  09:00 UTC = 10:00 WAT
#  12:00 UTC = 13:00 WAT
#  15:00 UTC = 16:00 WAT
#  18:00 UTC = 19:00 WAT
#  21:00 UTC = 22:00 WAT
# ─────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 0 * * *'    # 01:00 WAT — daily reset
    - cron: '0 3 * * *'    # 04:00 WAT
    - cron: '0 6 * * *'    # 07:00 WAT
    - cron: '0 9 * * *'    # 10:00 WAT
    - cron: '0 12 * * *'   # 13:00 WAT
    - cron: '0 15 * * *'   # 16:00 WAT
    - cron: '0 18 * * *'   # 19:00 WAT
    - cron: '0 21 * * *'   # 22:00 WAT

  workflow_dispatch:   # Manual trigger — sends all HIGH picks regardless of dedup

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── MUST be first — cache key depends on this ────────────────────────
      - name: Set TODAY
        run: echo "TODAY=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      # ── Decide RUN_MODE ──────────────────────────────────────────────────
      - name: Set RUN_MODE
        run: |
          HOUR=$(date -u +%H)
          EVENT="${{ github.event_name }}"
          if   [ "$EVENT" = "workflow_dispatch" ]; then
            echo "RUN_MODE=force"        >> $GITHUB_ENV
            echo "▶ force  (manual trigger)"
          elif [ "$HOUR"  = "00" ]; then
            echo "RUN_MODE=daily_reset"  >> $GITHUB_ENV
            echo "▶ daily_reset  (01:00 WAT)"
          else
            echo "RUN_MODE=normal"       >> $GITHUB_ENV
            echo "▶ normal  (UTC hour=$HOUR)"
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      # ── Date-scoped cache — auto-resets each day ─────────────────────────
      - name: Restore sent_matches cache
        uses: actions/cache@v4
        with:
          path: sent_matches.json
          key: sent-matches-${{ env.TODAY }}
          restore-keys: sent-matches-

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          RUN_MODE:  ${{ env.RUN_MODE }}
        run: python predictor.py

      - name: Save sent_matches cache
        if: always()
        uses: actions/cache@v4
        with:
          path: sent_matches.json
          key: sent-matches-${{ env.TODAY }}
