name: WTA Prediction Bot

# ─────────────────────────────────────────────────────────────
# SCHEDULE  (UTC — WAT is UTC+1)
#
#  00:00 UTC = 01:00 WAT  ← DAILY RESET
#  03:00 UTC = 04:00 WAT
#  06:00 UTC = 07:00 WAT
#  09:00 UTC = 10:00 WAT
#  12:00 UTC = 13:00 WAT
#  15:00 UTC = 16:00 WAT
#  18:00 UTC = 19:00 WAT
#  21:00 UTC = 22:00 WAT
# ─────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 3 * * *'
    - cron: '0 6 * * *'
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '0 15 * * *'
    - cron: '0 18 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Set TODAY and RUN_MODE
        run: |
          echo "TODAY=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          HOUR=$(date -u +%H)
          EVENT="${{ github.event_name }}"
          if   [ "$EVENT" = "workflow_dispatch" ]; then
            echo "RUN_MODE=force"       >> $GITHUB_ENV
          elif [ "$HOUR"  = "00" ]; then
            echo "RUN_MODE=daily_reset" >> $GITHUB_ENV
          else
            echo "RUN_MODE=normal"      >> $GITHUB_ENV
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      # ── Dedup cache ──────────────────────────────────────────────────────
      # Actions cache is IMMUTABLE once written with a given key.
      # Solution: restore with a prefix wildcard (gets latest matching entry),
      # then save with a unique key (timestamp) so each run writes a new entry.
      # The restore_keys prefix ensures we always get the most recent file.
      - name: Restore sent_matches cache
        uses: actions/cache/restore@v4
        with:
          path: sent_matches.json
          key: sent-matches-${{ env.TODAY }}-never-exact-match
          restore-keys: |
            sent-matches-${{ env.TODAY }}-
            sent-matches-

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          RUN_MODE:  ${{ env.RUN_MODE }}
        run: python predictor.py

      # Save with a unique timestamped key so it's never blocked by immutability
      - name: Save sent_matches cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sent_matches.json
          key: sent-matches-${{ env.TODAY }}-${{ github.run_id }}-${{ github.run_attempt }}
